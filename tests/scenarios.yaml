# Scenario tests for FlexTool.
#
# Each entry defines a scenario name and the CSV files to compare against
# golden files in test/expected/<scenario>/.
#
# CSV filenames come from the filenames: section of templates/default_plots.yaml.
#
# To add a new scenario:
#   1. Add an entry here
#   2. Run: pytest test/ --regenerate <scenario>
#   3. Inspect test/expected/<scenario>/ and commit

# --- Barebone ---
- scenario: base
  smoke: true
  csvs:
    - node__d.csv
    - costs__dt.csv
    - summary_solve.csv
    - slack__upward__node_state__dt.csv
  # Pure slack-penalty 2-day dispatch (no generators). Hand-derivation:
  #   sum of `upward slack penalty` column in costs__dt.csv = 26,192,700 CUR
  #   annualization factor = 365 / 2 (years_in_use = 2/365)
  #   objective (M CUR) = 26,192,700 * 365/2 / 1e6 = 4780.16775
  expected_objective: 4780.16775
  expected_objective_tolerance: 1.0e-5
  time_budget_seconds: 10.0

# Base + non-uniform timeset_weights = {t0001:0.25, t0002:0.75}. After
# normalization the per-step cost weights become 0.5 and 1.5, shifting
# the cost attribution between the two timesteps without changing the
# dispatch decisions. Regression tripwire: if the runner stops reading
# timeset_weights or the normalization math changes, costs__dt.csv
# diverges from the golden.
- scenario: base_weighted
  csvs:
    - node__d.csv
    - costs__dt.csv
    - summary_solve.csv
  # Same dispatch as base, but timeset weights redistribute costs.
  #   sum of `upward slack penalty` column in costs__dt.csv = 27,909,360 CUR
  #   objective (M CUR) = 27,909,360 * 365/2 / 1e6 = 5093.4582
  expected_objective: 5093.4582
  expected_objective_tolerance: 1.0e-5
  time_budget_seconds: 10.0

# lifetime_method = no_investment: wind_plant with lifetime 10y in a
# multi-year horizon (p2020, p2025, p2030, p2035). The first-period
# lifetime window ends at y2030, so v_invest is free in p2020/p2025 and
# pinned to 0 in p2030/p2035 — visible in unit_capacity__d.csv.
- scenario: multi_year_wind_no_investment
  csvs:
    - unit_capacity__d.csv
    - costs__dt.csv
    - summary_solve.csv
  time_budget_seconds: 10.0

- scenario: scale_to_peak_flow
  csvs:
    - node__d.csv
    - node__dt.csv
    - summary_solve.csv
  time_budget_seconds: 10.0

- scenario: capacity_margin
  csvs:
    - slack__capacity_margin__d.csv
    - summary_solve.csv
  # Capacity-margin shortfall priced in M CUR via a high penalty.
  # The per-period capacity-margin slack value times the penalty gives
  # the objective (no per-time-step costs). Locked to the observed
  # value; large magnitude (~1.6 M CUR) makes 1e-5 tolerance still tight.
  expected_objective: 1585705.0485
  expected_objective_tolerance: 1.0e-5
  time_budget_seconds: 10.0

- scenario: fullYear
  csvs:
    - summary_solve.csv
  # Full-year (8760-hour) dispatch with no generators — pure slack.
  # Locked to observed solver objective.
  expected_objective: 4952.685
  expected_objective_tolerance: 1.0e-5
  time_budget_seconds: 10.0

- scenario: fullYear_roll
  csvs:
    - summary_solve.csv

