# --- constraint_cumulative_pre_built_capacity_coeff + invested ---
# Multi-year wind with a period-over-period growth cap:
#   v_invest[wind_plant, d] <= 0.1 * pre_built[wind_plant, d]
# Exercises the new pre-built coefficient together with the fixed
# invested coefficient. The baseline (multi_year_one_solve_battery)
# invests ~385 MW in p2020 alone; under the 0.1 cap the trajectory is
# forced down and the capacity builds exponentially at 10%/period off
# the existing 1000 MW baseline. A regression in either term (e.g.
# reverting to the old #active×v_invest expression or subtracting
# v_divest from the pre-built sum) changes the capacity ladder and costs.
- scenario: multi_year_wind_growth_cap
  csvs:
    - unit_capacity__d.csv
    - costs__dt.csv
    - summary_solve.csv
  time_budget_seconds: 10.0

# --- Promoted Layer-3 regressions (2026-04-30) ---

# Regression guard: hyphens in entity names (e.g. ``BRA_ARG-H2``) survived
# DB → solve → CSV when combined with non-zero ``other_operational_cost``
# (which forces the connection into ``pssdt_varCost_eff_connection``).
# The original report blamed the hyphen colliding with MathProg's
# subtraction operator; the validator that rejected hyphens was a false
# positive. This scenario adds a parallel ``west-east-aux`` connection
# with VOM=0.1 to ``network_coal_wind`` and locks the dispatch CSVs.
- scenario: hyphenated_entity_names
  csvs:
    - connection__dt.csv
    - costs__dt.csv
  # network_coal_wind + west-east-aux connection with VOM=0.1.
  #   sum(costs__dt.csv all numeric columns) = 3,004,895.90 CUR
  #   objective (M CUR) = 3,004,895.90 * 365/2 / 1e6 = 548.39350
  # Slightly larger tolerance — connection routing across parallel
  # links has multiple equally-optimal solutions in dispatch.
  #
  # Golden regen note (commit e03e3047, 2026-05-14): when the solver
  # was switched from glpsol to highs (cluster F fix — glpsol binary
  # removed at Δ.22; the d2018b3c per-entity ``solver=glpsol`` pin
  # was a documented temporary workaround), HiGHS picks a different
  # LP vertex on this degenerate-optimum scenario.  Total objective
  # is unchanged (548.39350 still holds), but per-column cost
  # allocation in costs__dt.csv shifts: HiGHS routes zero flow
  # through the parallel west-east-aux connection (VOM=0.1 cost
  # would be > baseline), so ``other_operational`` is zero and
  # ``commodity_cost`` absorbs the ~75 CUR/day delta.  The
  # ``connection__dt.csv`` golden was unaffected (byte-identical
  # under HiGHS).  Decision: accept the regen as the authoritative
  # post-glpsol-retirement golden.  Both LP vertices are equally
  # optimal; v3.32.0's glpsol-flavoured allocation has no physical
  # preference over HiGHS's choice once glpsol is gone.
  expected_objective: 548.39350
  expected_objective_tolerance: 1.0e-4
  time_budget_seconds: 10.0

# Regression guard: ``years_represented = 0.5`` correctly halves the
# inflation factor (and therefore all annualized cost terms in the
# objective). Before the write_years_represented fix, the factor came
# out as 1.0 instead of 0.5.
- scenario: years_represented_half
  csvs:
    - unit__outputNode__dt.csv
    - costs__dt.csv
    - costs_discounted.csv
    - cost_unit_annualized__d.csv
    - cost_node_annualized__d.csv
    - cost_unit_discounted__d.csv
    - cost_node_discounted__d.csv
  # Hand-derivation:
  #   sum(costs__dt.csv numeric columns) = 6,268,700 CUR
  #   annualization (years_represented=0.5, 24h block) = 365/4
  #   objective (M CUR) = 6,268,700 * 365/4 / 1e6 = 572.018875
  expected_objective: 572.018875
  expected_objective_tolerance: 1.0e-5
  time_budget_seconds: 10.0

# Regression guard: ``years_represented = 2.5`` emits 3 width rows
# (1, 1, 0.5) summing to 2.5. Before the ceil-based fix the trailing
# 0.5-year row was dropped (``int(max(1.0, 2.5))`` = 2) so the factor
# came out as 2.0 instead of 2.5.
- scenario: years_represented_2_5
  csvs:
    - unit__outputNode__dt.csv
    - costs__dt.csv
    - costs_discounted.csv
    - cost_unit_annualized__d.csv
    - cost_node_annualized__d.csv
    - cost_unit_discounted__d.csv
    - cost_node_discounted__d.csv
  # Same dispatch as years_represented_half but years_represented=2.5
  # (5x larger). Objective therefore 5x: 572.018875 * 5 = 2860.094375.
  expected_objective: 2860.094375
  expected_objective_tolerance: 1.0e-5
  time_budget_seconds: 10.0

# Regression guard: ``transfer_method = unidirectional`` resolves to
# ``method_1way_1var_off`` end-to-end. Setting all three transmission
# connections of ``network_coal_wind`` to unidirectional restricts each
# to source → sink only. The ``connection__dt.csv`` golden locks the
# directionality (no negative flows on any connection).
- scenario: unidirectional_connection
  csvs:
    - connection__dt.csv
    - costs__dt.csv
  # network_coal_wind with all three connections unidirectional.
  #   sum(costs__dt.csv numeric columns) = 3,209,383.27 CUR
  #   objective (M CUR) = 3,209,383.27 * 365/2 / 1e6 = 585.71245
  expected_objective: 585.71245
  expected_objective_tolerance: 1.0e-4
  time_budget_seconds: 10.0

# Regression guard: ``transfer_method = no_losses_no_variable_cost``
# resolves to ``method_2way_1var_off`` (the .mod's single-signed-flow
# 2-way method, ``v_flow ∈ [-cap, +cap]``).  A lossless 2-way connection
# ``ll`` (lw↔le) is forced to carry +100 MW (lw→le) at t0001 and −100 MW
# (le→lw, the REVERSE direction) at t0002 by flipping the node inflows
# between steps.  The negative t0002 flow is the proof the reverse-flow
# auxiliary ``v_flow_back`` works; without it the engine would leave
# t0002 = 0 and pay ~2,000,000 in loss-of-load + spill slack.
#   all node balances exact, zero slack → objective = 0.
- scenario: lossless_2way
  csvs:
    - connection__dt.csv
    - costs__dt.csv
  expected_objective: 0.0
  expected_objective_tolerance: 1.0e-6
  time_budget_seconds: 10.0

# --- Stochastic ---
# Smoke coverage for the include_stochastics / stochastic_branches
# pipeline. Built from the user-facing
# ``how to example databases/stochastics.sqlite`` (exported to
# tests/fixtures/stochastics.json). 2_day_stochastic_dispatch activates
# stochastic branching on hydro_reservoir + wind_plant via the
# ``add_stochastics`` group; populates period__branch with a non-trivial
# topology and exercises the pbt_* parameter family, pd_branch_weight
# / pdt_branch_weight normalisation, and the non-anticipativity
# constraints. Without this entry, none of those code paths are
# exercised by the scenario suite.
#
- scenario: 2_day_stochastic_dispatch
  smoke: true
  db_fixture: stochastic
  csvs:
    - costs__dt.csv
    - summary_solve.csv
  # Was 182.903 when pdtProfile silently dropped per-branch values
  # (entity_period_calc_params.py read solve_data/group_process.csv
  # which never existed; stoch_profile = {} → all branches got the
  # realised profile). After the path fix to input/group__process.csv,
  # the LP is constrained by min(per-branch wind profile) per step,
  # raising thermal dispatch by ~47%.
  expected_objective: 269.406895209
  expected_objective_tolerance: 1.0e-4
  time_budget_seconds: 30.0
