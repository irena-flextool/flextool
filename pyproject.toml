requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "flextool"
version = "3.8.0"
description = "IRENA FlexTool is an energy and power systems model for understanding the role of variable power generation in future energy systems."
requires-python = ">=3.8,<3.13"
dependencies = [
    "pandas",
    "openpyxl",
    "odfpy",
    "spinedb-api",
    "python-calamine",
    "xlsxwriter"
]

[tool.setuptools]
packages = [
    "flextool",
    "flextool.cli",
    "flextool.flextoolrunner",
    "flextool.process_inputs",
    "flextool.process_outputs",
    "flextool.plot_outputs",
    "flextool.update_flextool",
    "flextool.helpers",
    "flextool.create_scenarios",
]

[project.scripts]
flextool = "flextool.cli.run_flextool:main"
flextool-write-outputs = "flextool.cli.write_outputs:main"
flextool-scenario-results = "flextool.cli.scenario_results:main"
flextool-read-tabular = "flextool.cli.read_tabular_input:main"
flextool-update = "flextool.cli.update_flextool:main"
flextool-migrate = "flextool.cli.migrate_database:main"
flextool-workflow = "flextool.cli.execute_flextool_workflow:main"
