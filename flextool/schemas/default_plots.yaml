        xlabel: MWh (annualized)
        ylabel: Node
        skip_data_with_only_zeroes: true
        scenario_rule: g
        comparison_overrides:
          map_dimensions_for_plots: [d_se, b_ge]
          legend: shared
          max_items_per_plot: 40
          max_subplots_per_file: 2
          subplots_per_row: 2
      sum_periods:
