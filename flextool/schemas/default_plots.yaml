# FlexTool Output Configuration
#
# Each result can have multiple configurations (user can choose which ones to plot).
# Each result is mapped to a dict with named parameters (only non-default values need to be specified):
#
# - plot_name: Name used for plot titles
# - map_dimensions_for_plots: [index_types, plot_type] tuple that maps index_types, i.e. dataframe dimensions
#     (first row indexes and then column indexes), to plot_type roles.
#     Omit for no plot. The first element describes the dataframe dimensions, the second how to plot them.
#     Each character in index_types maps 1:1 to a character in plot_type. An underscore separates
#     row index dimensions from column index dimensions in both strings (underscore is obligatory only for index_types).
#     index_types characters: 'd' period, 't' time, 'e' entity, 'p' parameter, 'g' group, 's' scenario, 'm' method
#       - please not that 'e' and 'g' will be automatically sorted - others will not be - and they are not really used in other ways, they just help to map correctly
#     plot_type characters:
#     - 't' marks the dimension as x-axis for line plots
#     - 'i' average the dimension in chunks of 'time_average_duration' and make the dimension x-axis for line plots
#     - 'l' turns that dimension into a separate line in a line plot
#     - 'b' for bars in the bar plot  (cannot combine b with t or l)
#     - 'g' groups the bars (and gives each member of the group an entry in the legend with separate color for each entry)
#     - 'e' expands the name of the bar on the y-axis with this additional dimension
#     - 's' stacks the dimension in bar plots or area plots
#     - 'u' sub-plots the dimension
#     - 'f' splits the dimension into separate files (member name appended to filename)
#     - 'm' sums the dimension
#     - 'a' averages the dimension
#     - 'x' no specific role
# - subplots_per_row: Number of subplots per row (default 2)
# - legend: Legend placement ('right', 'all', or default)
# - bar_orientation: Orientation for bar charts only (default 'horizontal', also 'vertical')
# - base_length: "Length" of each subplot in the orientation of the bars or height for time plots (in inches, default 4)
# - max_subplots_per_file: Maximum subplots per file before splitting (default 6). When exceeded, creates multiple files with _1, _2, etc. suffixes
# - max_items_per_plot: Maximum items (bars, lines, or stacks) per plot/subplot (default 10).
#     With subplots: splits each subplot and appends _1, _2, etc. to subplot names. Without subplots: creates multiple files
# - time_average_duration: Duration of time blocks that are averaged (in time steps)
# - xlabel: Label for x axis (string or list of strings for per-subplot labels)
# - ylabel: Label for y axis (string or list of strings for per-subplot labels)
# - axis_bounds: Fix value-axis limits. Options:
#     'shared' — compute global min/max across all subplots and apply to all (for visual comparability)
#     'independent' — each subplot auto-scales independently (default)
#     Single pair [min, max] applies to all subplots
#     List of pairs [[0,1],[],[0,100]] applies per subplot (empty entry = auto-scale)
# - axis_tick_format: Python format spec for value-axis tick labels (default 'dynamic').
#     'dynamic' adapts to data range: commas for thousands, decimals for small values,
#     engineering notation (×10⁹) for values > 990M. Shows ~2 significant digits.
#     Single string applies to all subplots; list applies per subplot, e.g. [',.0f', '.2%']
# - value_label: Show value labels on bar charts. Options:
#     true or 'dynamic' — show labels using dynamic formatting (adapts to data range)
#     A Python format spec string (e.g. '.2f') — show labels with that format
#     false or omitted — no value labels (default)
#     When enabled, the axis is extended by 10% to make room for labels within the plot area.
# - always_include_zero_in_axis: true/false (default true). Zero will always be within the axis bounds (preventing automatic behaviour where it can be hard to see the scale of the plot)
# - skip_data_with_only_zeroes: true/false (default false). Drops all-zero columns (and all-zero rows for bar charts) before plotting
#
# --- Comparison-mode add-ons -------------------------------------------------
# These two optional fields drive the comparison view (multiple scenarios shown
# side by side).  When `scenario_rule` is set, comparison-mode rendering reads
# this single config and folds the scenario dim in on the fly — there is no
# separate comparison YAML.
#
# - scenario_rule: How the 'scenario' dim is handled in comparison mode.
#     Common choices: 'g' (grouped/coloured bars), 'l' (line series),
#     'u' (subplot panel per scenario), 'f' (file per scenario).
#     For pure-derivation configs, this is the ONLY thing you need.
#     Example: single map_dimensions_for_plots [d_e, t_l] + scenario_rule 'l'
#     produces comparison-effective rules [d_se, t_gl] at view time.
#
# - comparison_overrides: Optional dict of plot settings that take effect only
#     in comparison mode. Any field listed above is allowed.  Two common uses:
#       * tighter layouts in comparison view (scenarios multiply bar count):
#           comparison_overrides:
#             max_subplots_per_file: 2
#             legend: shared
#       * preserving a custom comparison rule layout that *isn't* just
#         "single + scenario_rule prepended" (rare — needed when the chart
#         author wanted a different visual treatment of an existing dim
#         in comparison mode):
#           comparison_overrides:
#             map_dimensions_for_plots: [ed_sp, eb_gu]
#     If `map_dimensions_for_plots` is absent from `comparison_overrides`, the
#     runtime auto-derives it as: prepend 's' to col_idx and `scenario_rule`
#     to col_rules.
# -----------------------------------------------------------------------------
#
# There is also filename configuration section after the plot rules (used by csv and parquet)

# Default time-range duration per variant letter, used the first time the
# user views that variant. After that, the user's last setting persists in
# the project's settings.yaml. The value 'all' means "show the full
# timeline" (resolved at view time to the available data length).
default_duration:
  h: 168
  w: all

order_of_variants: [p, a, h, w]
max_items_per_subplot_column: 40

plots:

