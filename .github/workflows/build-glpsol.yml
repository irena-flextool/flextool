name: Build glpsol
on: workflow_dispatch

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-15
            os: macos
            arch: arm64
          - runner: ubuntu-22.04
            os: linux
            arch: x64
          - runner: windows-latest
            os: windows
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout mingodad/GLPK
        uses: actions/checkout@v4
        with:
          repository: mingodad/GLPK

      - name: Build glpsol (Unix)
        if: runner.os != 'Windows'
        run: |
          CFLAGS="-O3 -DWITH_SPLAYTREE -DNDEBUG" ./configure --disable-shared --enable-static
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          file examples/glpsol
          ls -lh examples/glpsol
          examples/glpsol --version || true

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build glpsol (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          copy w64\config_VC w64\config.h
          cd w64
          nmake /f makefile_VC CFLAGS="/I. /I..\src /I..\src\amd /I..\src\api /I..\src\bflib /I..\src\colamd /I..\src\draft /I..\src\env /I..\src\intopt /I..\src\minisat /I..\src\misc /I..\src\mpl /I..\src\npp /I..\src\proxy /I..\src\simplex /I..\src\zlib /DHAVE_CONFIG_H=1 /D_CRT_SECURE_NO_WARNINGS=1 /DWITH_SPLAYTREE /DNDEBUG /nologo /W3 /O2"
          glpsol.exe --version

      - name: Upload binary (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: glpsol-${{ matrix.os }}-${{ matrix.arch }}
          path: examples/glpsol

      - name: Upload binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: glpsol-${{ matrix.os }}-${{ matrix.arch }}
          path: w64/glpsol.exe
