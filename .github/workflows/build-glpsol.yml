name: Build glpsol for macOS
on: workflow_dispatch

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-15
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout mingodad/GLPK
        uses: actions/checkout@v4
        with:
          repository: mingodad/GLPK

      - name: Build glpsol
        run: |
          ./configure --disable-shared --enable-static
          make -j$(sysctl -n hw.ncpu)
          file examples/glpsol
          ls -lh examples/glpsol
          examples/glpsol --version || true

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: glpsol-macos-${{ matrix.arch }}
          path: examples/glpsol
